kind = "web"
previewPath = "/"
title = "Questione di Avvicinamento"
version = "1.0.0"
id = "artifacts/asintoti"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24825

[services.development]
run = "pnpm --filter @workspace/asintoti run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/asintoti", "run", "build" ]
publicDir = "artifacts/asintoti/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24825"
BASE_PATH = "/"
